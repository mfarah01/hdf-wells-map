<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Where We Build Wells — Human Development Fund</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js" defer></script>
  <script src="./token.js"></script>
  <style>
    :root {
      --hdf-primary: #0d577f;
      --hdf-primary-dark: #0d3e58;
      --hdf-gold: #eecd25;
      --hdf-text: #393939;
      --hdf-text-light: #666666;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      color: var(--hdf-text);
      display: flex; flex-direction: column;
      background: #eef1f4;
    }

    .pm-head {
      background: linear-gradient(135deg, var(--hdf-primary) 0%, var(--hdf-primary-dark) 100%);
      color: #fff;
      padding: .9rem 1.4rem;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: .75rem 1.25rem;
      flex-shrink: 0;
    }
    .pm-title { display: flex; align-items: center; gap: .8rem; }
    .pm-title img { height: 36px; width: auto; }
    .pm-title h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; }
    .pm-title .sub { font-size: .75rem; color: rgba(255,255,255,0.75); margin-top: .1rem; }

    .pm-stats { display: flex; gap: 1.4rem; flex-wrap: wrap; }
    .pm-stat { text-align: center; }
    .pm-stat .v { font-size: 1.15rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .pm-stat .l { font-size: .62rem; text-transform: uppercase; letter-spacing: .08em; color: rgba(255,255,255,0.72); }

    .chip-row { display: flex; gap: .4rem; flex-wrap: wrap; }
    .chip {
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.12);
      color: #fff;
      border-radius: 999px;
      padding: .25rem .7rem;
      font-size: .72rem; font-weight: 600;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: .35rem;
      font-family: inherit;
      transition: background .15s ease;
    }
    .chip:hover { background: rgba(255,255,255,0.22); }
    .chip.active { background: var(--hdf-gold); color: var(--hdf-primary-dark); border-color: var(--hdf-gold); }
    .chip .dot { width: 8px; height: 8px; border-radius: 50%; }

    .pm-map-wrap { position: relative; flex: 1; min-height: 380px; }
    #publicMap { position: absolute; inset: 0; background: #eef1f4; }

    .pm-legend {
      position: absolute; left: 12px; bottom: 12px; z-index: 5;
      background: rgba(255,255,255,0.94);
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      padding: .6rem .8rem;
      font-size: .72rem;
      display: flex; flex-direction: column; gap: .3rem;
      max-width: 240px;
    }
    .legend-item { display: inline-flex; align-items: center; gap: .45rem; }
    .legend-swatch { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .legend-swatch.agg { background: #90a4b8; border: 2px dashed #5c7893; }

    .mapboxgl-popup-content {
      font-family: 'Outfit', system-ui, sans-serif;
      border-radius: 10px; padding: 0; overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      min-width: 230px; max-width: 300px;
    }
    .wm-pop-head {
      background: var(--hdf-primary-dark); color: #fff;
      padding: .65rem .85rem; font-weight: 700; font-size: .92rem; line-height: 1.3;
    }
    .wm-pop-body { padding: .7rem .85rem; font-size: .8rem; }
    .wm-pop-row { margin-bottom: .3rem; }
    .wm-pop-row .lbl { color: var(--hdf-text-light); }
    .wm-pop-badge {
      display: inline-block; padding: .12rem .5rem; border-radius: 999px;
      font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    }
    .wm-pop-badge.completed { background: #C8E6C9; color: #1b5e20; }
    .wm-pop-badge.in_progress { background: #FFF3E0; color: #8a5300; }
    .wm-pop-badge.planned { background: #E3F2FD; color: #0d477f; }
    .wm-pop-img {
      display: block; width: 100%; height: 170px; object-fit: cover;
      border-radius: 8px; margin-bottom: .55rem; background: #eef1f4;
    }
    .wm-pop-btn {
      display: block; text-align: center; margin-top: .55rem;
      background: var(--hdf-primary); color: #fff; text-decoration: none;
      padding: .5rem .75rem; border-radius: 8px; font-weight: 600; font-size: .8rem;
      transition: background .15s ease;
    }
    .wm-pop-btn:hover { background: var(--hdf-primary-dark); }
    .wm-pop-list { margin: .3rem 0 0; padding-left: 1rem; max-height: 150px; overflow-y: auto; }
    .wm-pop-list li { margin-bottom: .2rem; }

    @media (max-width: 640px) {
      .pm-stats { gap: .9rem; }
      .pm-stat .v { font-size: .98rem; }
    }

    /* ── Right-side Drawer (cardStyle: "drawer") ── */
    .wm-drawer {
      position: absolute; top: 0; right: 0; bottom: 0; width: 380px;
      background: #fff; box-shadow: -8px 0 24px rgba(0,0,0,.18);
      display: flex; flex-direction: column; overflow: hidden;
      z-index: 10; transform: translateX(100%); transition: transform .28s ease;
    }
    .wm-drawer.open { transform: translateX(0); }
    .wm-drawer-photo { position: relative; flex-shrink: 0; aspect-ratio: 4/3; background: #eef1f4; }
    .wm-drawer-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .wm-drawer-close, .wm-modal-close {
      position: absolute; top: 12px; left: 12px;
      width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer;
      background: rgba(255,255,255,.95); color: var(--hdf-text);
      font-size: 1.2rem; line-height: 1;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    .wm-drawer-body { padding: 1.1rem 1.25rem; overflow-y: auto; flex: 1;
      font-family: 'Outfit', system-ui, sans-serif; color: var(--hdf-text); }
    .wm-eyebrow {
      font-size: .65rem; text-transform: uppercase; letter-spacing: .1em;
      color: var(--hdf-primary); font-weight: 700; margin-bottom: .3rem;
    }
    .wm-drawer-title { font-size: 1.25rem; font-weight: 700; color: var(--hdf-primary-dark); line-height: 1.2; margin-bottom: .6rem; }
    .wm-stat-row { display: flex; gap: 1.5rem; padding: .8rem 0;
      border-top: 1px solid #e5e9ee; border-bottom: 1px solid #e5e9ee; margin: .8rem 0; }
    .wm-stat .v { font-size: 1.4rem; font-weight: 800; color: var(--hdf-primary); line-height: 1;
      font-variant-numeric: tabular-nums; }
    .wm-stat .l { font-size: .68rem; text-transform: uppercase; letter-spacing: .05em;
      color: var(--hdf-text-light); margin-top: .25rem; }
    .wm-detail-list { list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: .5rem; }
    .wm-detail-list li { display: flex; justify-content: space-between; font-size: .85rem; padding: .2rem 0; }
    .wm-detail-list .lbl { color: var(--hdf-text-light); }
    .wm-detail-list .val { font-weight: 600; }

    /* ── Editorial Modal (cardStyle: "modal") ── */
    .wm-modal-backdrop {
      position: absolute; inset: 0; background: rgba(13, 62, 88, .55);
      display: none; align-items: center; justify-content: center;
      z-index: 20; padding: 1rem;
    }
    .wm-modal-backdrop.open { display: flex; }
    .wm-modal {
      width: 100%; max-width: 560px;
      background: #fff; border-radius: 16px; overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      font-family: 'Outfit', system-ui, sans-serif;
      max-height: calc(100% - 2rem); display: flex; flex-direction: column;
    }
    .wm-modal-photo { position: relative; flex-shrink: 0; }
    .wm-modal-photo img { width: 100%; aspect-ratio: 21/9; object-fit: cover; display: block; }
    .wm-modal-close { top: 12px; left: 12px; background: rgba(0,0,0,.55); color: #fff; }
    .wm-modal-body { padding: 1.3rem 1.6rem 1.6rem; overflow-y: auto; }
    .wm-modal-eyebrow {
      display: flex; align-items: center; gap: .5rem;
      font-size: .7rem; text-transform: uppercase; letter-spacing: .1em;
      color: var(--hdf-text-light); font-weight: 600; margin-bottom: .35rem;
    }
    .wm-modal-title { font-size: 1.45rem; font-weight: 700; color: var(--hdf-primary-dark);
      line-height: 1.2; margin-bottom: 1rem; }
    .wm-impact {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem;
      padding: 1rem; background: linear-gradient(135deg, #f5f8fa 0%, #eaf1f5 100%);
      border-radius: 12px; margin-bottom: 1rem;
    }
    .wm-impact .stat { text-align: center; }
    .wm-impact .stat .v {
      font-size: 1.5rem; font-weight: 800; color: var(--hdf-primary);
      font-variant-numeric: tabular-nums; line-height: 1;
    }
    .wm-impact .stat .l {
      font-size: .62rem; text-transform: uppercase; letter-spacing: .06em;
      color: var(--hdf-text-light); margin-top: .3rem; line-height: 1.2;
    }
    .wm-modal-details {
      display: grid; grid-template-columns: 1fr 1fr; gap: .5rem 1.5rem; font-size: .85rem;
    }
    .wm-modal-details .row { display: flex; justify-content: space-between;
      padding: .28rem 0; border-bottom: 1px dashed #e5e9ee; }
    .wm-modal-details .lbl { color: var(--hdf-text-light); }
    .wm-modal-details .val { font-weight: 600; }

    @media (max-width: 640px) {
      .wm-drawer { width: 100%; }
      .wm-modal-details { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="pm-head">
    <div class="pm-title">
      <img src="https://hdfund.org/wp-content/uploads/2025/04/HDF-Logo.png" alt="Human Development Fund">
      <div>
        <h1>Where We Build Wells</h1>
        <div class="sub">Human Development Fund · Water Program</div>
      </div>
    </div>

    <div class="pm-stats" id="statsRow" style="display:none;">
      <div class="pm-stat"><div class="v" id="stTotal">–</div><div class="l">Wells Built</div></div>
      <div class="pm-stat"><div class="v" id="stCountries">–</div><div class="l">Countries</div></div>
    </div>
  </div>

  <div class="pm-map-wrap">
    <div id="publicMap"></div>
    <div class="pm-legend" id="mapLegend">
      <span class="legend-item"><span class="legend-swatch agg"></span> Country total (precise location coming soon)</span>
    </div>
    <aside class="wm-drawer" id="wmDrawer" aria-hidden="true"></aside>
    <div class="wm-modal-backdrop" id="wmModal" aria-hidden="true"></div>
  </div>

  <script>
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }

    (function waitForMapbox(tries) {
      if (typeof mapboxgl !== 'undefined') return boot();
      if (tries > 60) return;
      setTimeout(() => waitForMapbox(tries + 1), 60);
    })(0);

    async function boot() {
      const res = await fetch('./wells.json');
      const data = await res.json();

      const stats = data.stats || {};
      document.getElementById('stTotal').textContent = stats.total ?? '–';
      document.getElementById('stCountries').textContent = stats.countries ?? '–';
      document.getElementById('statsRow').style.display = '';

      const pinned = data.pinned || [];
      const aggregates = data.aggregates || [];

      const legend = document.getElementById('mapLegend');
      const li = document.createElement('span');
      li.className = 'legend-item';
      li.innerHTML = '<span class="legend-swatch" style="background:#0d577f"></span> Well';
      legend.insertBefore(li, legend.firstChild);

      mapboxgl.accessToken = window.MAPBOX_TOKEN || '';
      const map = new mapboxgl.Map({
        container: 'publicMap',
        style: 'mapbox://styles/mapbox/satellite-streets-v12',
        center: [45, 12],
        zoom: 2.6,
        attributionControl: true,
        cooperativeGestures: true,
      });
      map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');
      map.on('error', (e) => console.error('Mapbox error:', e && e.error && e.error.message));

      const pinsGeo = {
        type: 'FeatureCollection',
        features: pinned.map(w => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [w.lng, w.lat] },
          properties: {
            id: w.id,
            country: w.country, location: w.location || '', type: w.type || '',
            depth: w.depth || '', system: w.system || '',
            status: w.status, startDate: w.startDate || '', endDate: w.endDate || '',
            beneficiaries: w.beneficiaries || '', households: w.households || '',
            cardStyle: w.cardStyle || '',
          },
        })),
      };
      const aggGeo = {
        type: 'FeatureCollection',
        features: aggregates.map(a => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [a.lng, a.lat] },
          properties: {
            country: a.country, count: a.count, completed: a.completed,
            wellsJson: JSON.stringify(a.wells),
          },
        })),
      };

      map.on('load', () => {
        map.addSource('wells', { type: 'geojson', data: pinsGeo, cluster: true, clusterMaxZoom: 11, clusterRadius: 42 });
        map.addLayer({
          id: 'clusters', type: 'circle', source: 'wells', filter: ['has', 'point_count'],
          paint: {
            'circle-color': '#0d577f',
            'circle-radius': ['step', ['get', 'point_count'], 16, 5, 20, 15, 26],
            'circle-stroke-width': 2, 'circle-stroke-color': '#fff',
          },
        });
        map.addLayer({
          id: 'cluster-count', type: 'symbol', source: 'wells', filter: ['has', 'point_count'],
          layout: { 'text-field': ['get', 'point_count_abbreviated'], 'text-size': 13 },
          paint: { 'text-color': '#ffffff' },
        });
        map.addLayer({
          id: 'well-pins', type: 'circle', source: 'wells', filter: ['!', ['has', 'point_count']],
          paint: {
            'circle-color': '#0d577f',
            'circle-radius': 8,
            'circle-stroke-width': 2, 'circle-stroke-color': '#fff',
            'circle-opacity': ['match', ['get', 'status'], 'completed', 1, 0.75],
          },
        });

        map.addSource('aggs', { type: 'geojson', data: aggGeo });
        map.addLayer({
          id: 'agg-bubbles', type: 'circle', source: 'aggs',
          paint: {
            'circle-color': '#90a4b8', 'circle-opacity': 0.55,
            'circle-radius': ['+', 12, ['*', 1.1, ['get', 'count']]],
            'circle-stroke-width': 2, 'circle-stroke-color': '#5c7893',
          },
        });
        map.addLayer({
          id: 'agg-count', type: 'symbol', source: 'aggs',
          layout: { 'text-field': ['to-string', ['get', 'count']], 'text-size': 13 },
          paint: { 'text-color': '#1f3a52' },
        });

        const bounds = new mapboxgl.LngLatBounds();
        pinsGeo.features.forEach(f => bounds.extend(f.geometry.coordinates));
        aggGeo.features.forEach(f => bounds.extend(f.geometry.coordinates));
        if (!bounds.isEmpty()) map.fitBounds(bounds, { padding: 60, maxZoom: 6 });

        map.on('click', 'clusters', (e) => {
          const f = map.queryRenderedFeatures(e.point, { layers: ['clusters'] })[0];
          map.getSource('wells').getClusterExpansionZoom(f.properties.cluster_id, (err, zoom) => {
            if (!err) map.easeTo({ center: f.geometry.coordinates, zoom });
          });
        });

        const drawerEl = document.getElementById('wmDrawer');
        const modalEl = document.getElementById('wmModal');
        const closeDrawer = () => drawerEl.classList.remove('open');
        const closeModal = () => modalEl.classList.remove('open');
        document.addEventListener('keydown', (ev) => {
          if (ev.key === 'Escape') { closeDrawer(); closeModal(); }
        });
        modalEl.addEventListener('click', (ev) => { if (ev.target === modalEl) closeModal(); });

        function wellTitle(p) {
          if (!p.location || p.location === p.country || p.location.endsWith(p.country)) {
            return p.location || p.country;
          }
          return p.location + ', ' + p.country;
        }
        function wellDates(p) { return [p.startDate, p.endDate].filter(Boolean).join(' → '); }
        function wellPhoto(p) { return 'photos/' + encodeURIComponent(p.id) + '.jpg'; }

        function openPopupCard(p, lngLat) {
          const dates = wellDates(p);
          const html =
            '<div class="wm-pop-head">' + esc(wellTitle(p)) + '</div>' +
            '<div class="wm-pop-body">' +
              '<img class="wm-pop-img" src="' + esc(wellPhoto(p)) + '" alt="" onerror="this.remove()">' +
              '<div class="wm-pop-row"><span class="wm-pop-badge ' + esc(p.status) + '">' + esc(String(p.status).replace('_', ' ')) + '</span></div>' +
              '<div class="wm-pop-row"><span class="lbl">Type:</span> ' + esc(p.type || '—') + '</div>' +
              (p.system ? '<div class="wm-pop-row"><span class="lbl">Pump:</span> ' + esc(p.system) + '</div>' : '') +
              (p.depth ? '<div class="wm-pop-row"><span class="lbl">Depth:</span> ' + esc(p.depth) + '</div>' : '') +
              (p.beneficiaries ? '<div class="wm-pop-row"><span class="lbl">Serves:</span> ' + esc(p.beneficiaries) + '</div>' : '') +
              (dates ? '<div class="wm-pop-row"><span class="lbl">Built:</span> ' + esc(dates) + '</div>' : '') +
            '</div>';
          new mapboxgl.Popup({ offset: 12 }).setLngLat(lngLat).setHTML(html).addTo(map);
        }

        function openDrawerCard(p) {
          closeModal();
          const dates = wellDates(p);
          drawerEl.innerHTML =
            '<div class="wm-drawer-photo">' +
              '<button class="wm-drawer-close" aria-label="Close">×</button>' +
              '<img src="' + esc(wellPhoto(p)) + '" alt="" onerror="this.style.display=\'none\'">' +
            '</div>' +
            '<div class="wm-drawer-body">' +
              '<div class="wm-eyebrow">' + esc(p.country) + ' · Well #' + esc(p.id) + '</div>' +
              '<div class="wm-drawer-title">' + esc(wellTitle(p)) + '</div>' +
              '<div><span class="wm-pop-badge ' + esc(p.status) + '">' + esc(String(p.status).replace('_', ' ')) + '</span></div>' +
              '<div class="wm-stat-row">' +
                (p.beneficiaries ? '<div class="wm-stat"><div class="v">' + esc(p.beneficiaries) + '</div><div class="l">People served</div></div>' : '') +
                (p.households ? '<div class="wm-stat"><div class="v">' + esc(p.households) + '</div><div class="l">Households</div></div>' : '') +
              '</div>' +
              '<ul class="wm-detail-list">' +
                '<li><span class="lbl">Type</span><span class="val">' + esc(p.type || '—') + '</span></li>' +
                (p.system ? '<li><span class="lbl">Pump system</span><span class="val">' + esc(p.system) + '</span></li>' : '') +
                (p.depth ? '<li><span class="lbl">Depth</span><span class="val">' + esc(p.depth) + '</span></li>' : '') +
                (dates ? '<li><span class="lbl">Built</span><span class="val">' + esc(dates) + '</span></li>' : '') +
              '</ul>' +
            '</div>';
          drawerEl.querySelector('.wm-drawer-close').addEventListener('click', closeDrawer);
          drawerEl.classList.add('open');
        }

        function openModalCard(p) {
          closeDrawer();
          const dates = wellDates(p);
          modalEl.innerHTML =
            '<div class="wm-modal">' +
              '<div class="wm-modal-photo">' +
                '<button class="wm-modal-close" aria-label="Close">×</button>' +
                '<img src="' + esc(wellPhoto(p)) + '" alt="" onerror="this.style.display=\'none\'">' +
              '</div>' +
              '<div class="wm-modal-body">' +
                '<div class="wm-modal-eyebrow">' + esc(p.country) + ' · Well #' + esc(p.id) + '</div>' +
                '<div class="wm-modal-title">' + esc(wellTitle(p)) + '</div>' +
                '<div class="wm-impact">' +
                  (p.beneficiaries ? '<div class="stat"><div class="v">' + esc(p.beneficiaries) + '</div><div class="l">People served</div></div>' : '') +
                  (p.households ? '<div class="stat"><div class="v">' + esc(p.households) + '</div><div class="l">Households</div></div>' : '') +
                  (p.depth ? '<div class="stat"><div class="v">' + esc(p.depth) + '</div><div class="l">Well depth</div></div>' : '') +
                '</div>' +
                '<div class="wm-modal-details">' +
                  '<div class="row"><span class="lbl">Type</span><span class="val">' + esc(p.type || '—') + '</span></div>' +
                  (p.system ? '<div class="row"><span class="lbl">System</span><span class="val">' + esc(p.system) + '</span></div>' : '') +
                  (dates ? '<div class="row"><span class="lbl">Built</span><span class="val">' + esc(dates) + '</span></div>' : '') +
                  '<div class="row"><span class="lbl">Status</span><span class="val">' + esc(String(p.status).replace('_', ' ')) + '</span></div>' +
                '</div>' +
              '</div>' +
            '</div>';
          modalEl.querySelector('.wm-modal-close').addEventListener('click', closeModal);
          modalEl.classList.add('open');
        }

        map.on('click', 'well-pins', (e) => {
          const p = e.features[0].properties;
          if (p.cardStyle === 'drawer') return openDrawerCard(p);
          if (p.cardStyle === 'modal') return openModalCard(p);
          openPopupCard(p, e.lngLat);
        });

        map.on('click', 'agg-bubbles', (e) => {
          const p = e.features[0].properties;
          let wells = [];
          try { wells = JSON.parse(p.wellsJson); } catch (_) {}
          const items = wells.map(w => {
            const detail = [w.system || w.type, w.depth].filter(Boolean).join(', ');
            return '<li>' + esc(w.location || w.type || 'Well') +
              (detail ? ' <span style="color:#888;">· ' + esc(detail) + '</span>' : '') + '</li>';
          }).join('');
          const html =
            '<div class="wm-pop-head">' + esc(p.country) + ' · ' + esc(p.count) + ' wells</div>' +
            '<div class="wm-pop-body">' +
              (items ? '<ul class="wm-pop-list">' + items + '</ul>' : '') +
            '</div>';
          new mapboxgl.Popup({ offset: 12, maxWidth: '320px' }).setLngLat(e.lngLat).setHTML(html).addTo(map);
        });

        for (const layer of ['clusters', 'well-pins', 'agg-bubbles']) {
          map.on('mouseenter', layer, () => { map.getCanvas().style.cursor = 'pointer'; });
          map.on('mouseleave', layer, () => { map.getCanvas().style.cursor = ''; });
        }
      });
    }
  </script>
</body>
</html>
